name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecommerce_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir apps/api run db:generate

      - name: Apply database migrations
        run: pnpm --dir apps/api run db:migrate:deploy

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: API tests
        run: pnpm --dir apps/api run test --runInBand

      - name: Seed database
        run: pnpm --dir apps/api run db:seed

      - name: Start API
        run: pnpm --dir apps/api run start:prod > api.log 2>&1 &
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecommerce_ci
        shell: bash
        timeout-minutes: 3

      - name: Start Web
        run: pnpm --dir apps/web run start:prod > web.log 2>&1 &
        env:
          NEXT_PUBLIC_AUTH_BASE_URL: http://127.0.0.1:4000
        shell: bash
        timeout-minutes: 3

      - name: Wait for services
        run: |
          for attempt in {1..60}; do
            API_OK=false; WEB_OK=false
            curl -fsS http://127.0.0.1:4000/health >/dev/null 2>&1 && API_OK=true
            curl -fsS http://127.0.0.1:3000 >/dev/null 2>&1 && WEB_OK=true
            if $API_OK && $WEB_OK; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:4000/health
          curl -fsS http://127.0.0.1:3000 >/dev/null
        shell: bash

      - name: Web smoke tests
        env:
          WEB_BASE_URL: http://127.0.0.1:3000
          API_BASE_URL: http://127.0.0.1:4000
          BASE_URL: http://127.0.0.1:4000
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          pnpm run smoke:postdeploy
          pnpm run smoke:payments
        shell: bash

      - name: Stop services
        if: always()
        run: |
          pkill -f "next start" || true
          pkill -f "node dist/src/main" || true
          pkill -f "node.*main" || true
