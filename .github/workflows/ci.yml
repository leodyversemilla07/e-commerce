name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ecommerce_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir apps/api run db:generate

      - name: Apply database migrations
        run: pnpm --dir apps/api run db:migrate:deploy

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: API tests
        run: pnpm --dir apps/api run test --runInBand

      - name: Seed database
        run: pnpm --dir apps/api run db:seed

      - name: API runtime smoke
        run: |
          pnpm --dir apps/api run start:prod > api.log 2>&1 &
          API_PID=$!
          trap 'kill $API_PID' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/health; then
              break
            fi
            if ! kill -0 $API_PID 2>/dev/null; then
              cat api.log
              exit 1
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:4000/health
          node -e 'fetch("http://127.0.0.1:4000/products").then((r) => r.json()).then((body) => { if (!Array.isArray(body.items) || body.items.length === 0) process.exit(1) })'
          BASE_URL=http://127.0.0.1:4000 pnpm run smoke:payments
