[build]
builder = "NIXPACKS"
buildCommand = "if [ -f ../../pnpm-lock.yaml ]; then cd ../..; fi; corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile && pnpm --dir apps/api run build"

[deploy]
preDeployCommand = "if [ -f ../../pnpm-lock.yaml ]; then cd ../..; fi; corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm run validate:env:api && pnpm --dir apps/api run db:migrate:deploy"
startCommand = "if [ -f ../../pnpm-lock.yaml ]; then cd ../..; fi; corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm run validate:env:api && pnpm --dir apps/api run start:prod"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
